name: mova

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mova
      POSTGRES_USER: mova
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mova-development-password}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mova -d mova"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://mova:${POSTGRES_PASSWORD:-mova-development-password}@postgres:5432/mova?sslmode=disable"
      APP_ORIGIN: "${APP_ORIGIN:-http://localhost}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      LIVEKIT_URL: "${LIVEKIT_URL:-ws://localhost:7880}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secretsecretsecretsecretsecretsecret}"
      LIVEKIT_TOKEN_TTL: "10m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - app

  backend-test:
    image: golang:1.26-alpine
    profiles: ["test"]
    working_dir: /src
    environment:
      TEST_DATABASE_URL: "postgres://mova:${POSTGRES_PASSWORD:-mova-development-password}@postgres:5432/mova?sslmode=disable"
    volumes:
      - .:/src
    command: ["go", "test", "-p", "1", "./cmd/...", "./internal/..."]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_ADDRESS: "${APP_ADDRESS:-http://localhost}"
      LIVEKIT_ADDRESS: "${LIVEKIT_ADDRESS:-http://livekit.localhost}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app

  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    network_mode: host
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        turn:
          enabled: true
          udp_port: 3478
          relay_range_start: 40000
          relay_range_end: 40100
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secretsecretsecretsecretsecretsecret}

networks:
  app:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
